<!-- ── 탭바 ── -->
<div class="tab-bar" id="tab-bar" style="display:none">
  <button class="tab-btn" id="tab-home"    onclick="showHome()">   <span class="tab-icon">📚</span>덱 목록</button>
  <button class="tab-btn" id="tab-starred" onclick="showStarred()"><span class="tab-icon">⭐</span>별표</button>
  <button class="tab-btn" id="tab-stats"   onclick="showStats()">  <span class="tab-icon">📊</span>통계</button>
</div>

<!-- ── 로딩 오버레이 ── -->
<div class="loading-overlay" id="loading-overlay" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">불러오는 중...</div>
</div>

<!-- ── 토스트 ── -->
<div class="toast" id="toast"></div>

<!-- ── 이어하기 모달 ── -->
<div class="modal-overlay" id="resume-modal" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="modal-title" style="margin-bottom:0">이어서 공부할까요?</div>
      <button onclick="document.getElementById('resume-modal').style.display='none'" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;line-height:1">✕</button>
    </div>
    <div class="modal-sub" id="resume-modal-sub"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" onclick="resumeFromFresh()">처음부터</button>
      <button class="modal-btn modal-btn-primary"   onclick="resumeStudy()">이어서 →</button>
    </div>
  </div>
</div>

<!-- ── 필터 모달 ── -->
<div class="modal-overlay" id="filter-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">어떤 카드를 공부할까요?</div>
    <div class="modal-sub" style="margin-bottom:16px">포함할 항목을 선택하세요</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
      <div class="filter-option" id="filter-opt-know" onclick="toggleFilterOpt('know')">
        <input type="checkbox" id="filter-know">
        <div class="filter-check-box"><span class="filter-check-icon">✓</span></div>
        <span style="color:#16a34a;font-weight:700;flex:1">✅ 알았어요</span>
        <span id="filter-know-count" style="color:var(--muted);font-size:12px"></span>
      </div>
      <div class="filter-option" id="filter-opt-maybe" onclick="toggleFilterOpt('maybe')">
        <input type="checkbox" id="filter-maybe">
        <div class="filter-check-box"><span class="filter-check-icon">✓</span></div>
        <span style="color:#d97706;font-weight:700;flex:1">💭 애매해요</span>
        <span id="filter-maybe-count" style="color:var(--muted);font-size:12px"></span>
      </div>
      <div class="filter-option" id="filter-opt-dont" onclick="toggleFilterOpt('dont')">
        <input type="checkbox" id="filter-dont">
        <div class="filter-check-box"><span class="filter-check-icon">✓</span></div>
        <span style="color:#e53e3e;font-weight:700;flex:1">😅 몰랐어요</span>
        <span id="filter-dont-count" style="color:var(--muted);font-size:12px"></span>
      </div>
      <div class="filter-option" id="filter-opt-none" onclick="toggleFilterOpt('none')">
        <input type="checkbox" id="filter-none">
        <div class="filter-check-box"><span class="filter-check-icon">✓</span></div>
        <span style="color:var(--muted);font-weight:700;flex:1">❓ 미평가</span>
        <span id="filter-none-count" style="color:var(--muted);font-size:12px"></span>
      </div>
    </div>
    <div id="filter-total-info" style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" onclick="closeFilterModal()">취소</button>
      <button class="modal-btn modal-btn-primary" onclick="startWithFilter()">공부 시작 →</button>
    </div>
  </div>
</div>

<!-- ── 카드 편집 모달 ── -->
<div class="modal-overlay" id="edit-card-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">카드 편집</div>
    <label class="form-label" style="margin-top:4px">앞면 (문제)</label>
    <textarea class="form-input" id="edit-card-front" rows="3" style="resize:vertical;margin-bottom:8px"></textarea>
    <label class="form-label">뒷면 (정답)</label>
    <textarea class="form-input" id="edit-card-back" rows="3" style="resize:vertical;margin-bottom:8px"></textarea>
    <label class="form-label">힌트 (선택)</label>
    <input class="form-input" id="edit-card-hint" placeholder="힌트 입력" style="margin-bottom:16px">
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" onclick="closeEditCardModal()">취소</button>
      <button class="modal-btn modal-btn-primary" onclick="saveEditCard()">저장</button>
    </div>
  </div>
</div>
