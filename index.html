<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>암기카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="flashcard.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div id="app"></div>

<script>
// ════════════════════════════════════════════════
// 앱 진입점 — HTML 화면 & JS 파일 로드
// ════════════════════════════════════════════════
const SCREENS = [
  'screens/login/login.html',
  'screens/home/home.html',
  'screens/study/study.html',
  'screens/done/done.html',
  'screens/adddeck/adddeck.html',
  'screens/starred/starred.html',
  'screens/stats/stats.html',
  'screens/settings/settings.html',
  'shared/shared.html',
];

const SCRIPTS = [
  'shared/state.js',
  'shared/db.js',
  'shared/ui.js',
  'screens/login/auth.js',
  'screens/home/home.js',
  'screens/starred/starred.js',
  'screens/stats/stats.js',
  'screens/settings/settings.js',
  'screens/study/study.js',
  'screens/adddeck/adddeck.js',
];

async function loadApp() {
  // 1) HTML 화면 fetch → #app에 주입
  const htmlParts = await Promise.all(SCREENS.map(p => fetch(p).then(r => r.text())));
  document.getElementById('app').innerHTML = htmlParts.join('\n');

  // 2) JS 파일 순서대로 로드 (의존성 순서 보장)
  for (const src of SCRIPTS) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  // 3) 앱 초기화
  loadTheme();
  document.getElementById('version-label').textContent = APP_VERSION;
  // GIS는 head에서 미리 로드 → 여기서 바로 초기화
  initGIS();
}

loadApp();
</script>
</body>
</html>
